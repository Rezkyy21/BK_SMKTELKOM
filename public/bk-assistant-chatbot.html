<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BK Assistant SMK Telkom Purwokerto</title>
  <style>
    :root {
      --primary: #c0392b;
      --surface: #ffffff;
      --surface-dark: #f5f5f5;
      --text: #222;
      --muted: #666;
      --border: rgba(0,0,0,0.08);
      --shadow: 0 18px 45px rgba(0,0,0,0.12);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, system-ui, sans-serif; color: var(--text); }

    .chat-widget {
      position: fixed; right: 20px; bottom: 20px;
      z-index: 9999; display: flex; flex-direction: column;
      align-items: flex-end; gap: 12px;
    }
    .chat-toggle {
      width: 60px; height: 60px; border-radius: 50%; border: none;
      background: var(--primary); color: white; font-size: 28px;
      cursor: pointer; display: grid; place-items: center;
      box-shadow: var(--shadow); transition: transform .2s;
    }
    .chat-toggle:hover { transform: scale(1.08); }
    .chat-panel {
      width: clamp(320px, 90vw, 380px); max-height: 76vh;
      background: var(--surface); border-radius: 24px;
      box-shadow: var(--shadow); overflow: hidden;
      display: none; flex-direction: column;
      border: 1px solid var(--border);
    }
    .chat-panel.open { display: flex; }
    .chat-header {
      background: var(--primary); color: white;
      padding: 16px 18px; display: flex;
      align-items: center; justify-content: space-between; gap: 12px;
    }
    .chat-header h2 { margin: 0; font-size: 1rem; }
    .chat-header p { margin: 4px 0 0; font-size: 0.84rem; opacity: .9; }
    .chat-close {
      background: rgba(255,255,255,.2); border: none; color: white;
      width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
      font-size: 1.2rem; display: grid; place-items: center; flex-shrink: 0;
    }
    .chat-body {
      padding: 16px; display: flex; flex-direction: column;
      gap: 10px; overflow-y: auto; min-height: 260px; flex: 1;
    }
    .message {
      max-width: 85%; border-radius: 16px; padding: 10px 14px;
      line-height: 1.55; word-break: break-word; font-size: 0.93rem;
    }
    .message.user {
      margin-left: auto; background: var(--primary);
      color: white; border-bottom-right-radius: 4px;
    }
    .message.assistant {
      background: #f2f2f2; color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .typing {
      font-size: 0.85rem; color: var(--muted);
      padding: 4px 16px; display: none;
    }
    .typing.active { display: block; }
    .chat-footer {
      padding: 12px 16px 16px; border-top: 1px solid var(--border);
      background: var(--surface-dark);
    }
    .chat-input { display: flex; gap: 8px; }
    .chat-input input {
      flex: 1; border: 1px solid rgba(0,0,0,.12); border-radius: 999px;
      padding: 11px 16px; font-size: 0.93rem; outline: none;
      color: var(--text);
    }
    .chat-input input::placeholder {
      color: var(--muted);
    }
    .chat-input input:focus { border-color: var(--primary); }
    .chat-input button {
      border: none; border-radius: 999px; background: var(--primary);
      color: white; padding: 0 18px; cursor: pointer; font-size: 0.93rem;
      font-weight: 500;
    }
    .chat-input button:hover { background: #a93226; }

    @media (max-width: 640px) {
      .chat-widget { right: 12px; bottom: 12px; }
      .chat-panel { width: min(100vw - 24px, 360px); }
    }
  </style>
</head>
<body>

<div class="chat-widget">
  <button id="chatToggle" class="chat-toggle" aria-label="Buka chatbot BK">💬</button>
  <div id="chatPanel" class="chat-panel">
    <div class="chat-header">
      <div>
        <h2>BK Assistant</h2>
        <p>Asisten BK SMK Telkom Purwokerto</p>
      </div>
      <button id="chatClose" class="chat-close">×</button>
    </div>
    <div id="chatBody" class="chat-body">
      <div class="message assistant">Halo! Saya BK Assistant SMK Telkom Purwokerto 😊 Ada yang bisa saya bantu hari ini?</div>
    </div>
    <div class="typing" id="typing">sedang mengetik...</div>
    <div class="chat-footer">
      <div class="chat-input">
        <input id="chatInput" type="text" placeholder="Tulis pesan..." autocomplete="off"/>
        <button id="sendBtn">Kirim</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ← Ganti dengan API key Gemini kamu
  const GEMINI_KEY = 'AIzaSyBpKNS0gM6zyUiE0aMtTPmMjOqicV636HY';

  const SYSTEM_PROMPT = `Kamu adalah Asisten BK (Bimbingan Konseling) digital SMK Telkom Purwokerto bernama "BK Assistant".

PERAN & TUGAS:
- Mendampingi siswa SMK dalam bidang: akademik, karir & jurusan, sosial-emosional, dan pengembangan diri
- Memberikan informasi jurusan kuliah, beasiswa, dan dunia kerja bidang teknologi/telekomunikasi
- Membantu siswa yang sedang menghadapi masalah pertemanan, motivasi belajar, atau tekanan dari keluarga

CARA BERKOMUNIKASI:
- Gunakan bahasa Indonesia yang ramah, hangat, dan mudah dipahami remaja
- Jawab singkat dan to-the-point (2-4 kalimat), tapi tetap empatik
- Boleh pakai emoji secukupnya agar terasa lebih dekat
- Jangan terkesan kaku atau seperti robot
- Jika pertanyaan di luar konteks BK, tolak dengan sopan dan arahkan kembali ke topik BK

BATASAN PENTING:
- Jika siswa menunjukkan tanda distress berat, sarankan segera menemui Guru BK secara langsung
- Jangan memberikan diagnosis medis atau psikologis
- Fokus pada pendampingan dan motivasi, bukan menghakimi

KONTEKS SEKOLAH:
- Nama sekolah: SMK Telkom Purwokerto
- Lokasi: Purwokerto, Jawa Tengah
- Jurusan: Rekayasa Perangkat Lunak (RPL), Teknik Komputer Jaringan (TKJ), Teknik Elektronika Industri (TEI), Broadcast
- Ruang BK ada di lantai 1`;

  const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`;

  let history = [];

  const panel = document.getElementById('chatPanel');
  const body  = document.getElementById('chatBody');
  const input = document.getElementById('chatInput');
  const typing = document.getElementById('typing');

  document.getElementById('chatToggle').onclick = () => {
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) input.focus();
  };
  document.getElementById('chatClose').onclick = () => panel.classList.remove('open');
  document.getElementById('sendBtn').onclick = send;
  input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

  function addMsg(text, role) {
    const el = document.createElement('div');
    el.className = 'message ' + role;
    el.textContent = text;
    body.appendChild(el);
    body.scrollTop = body.scrollHeight;
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.disabled = true;
    addMsg(text, 'user');
    history.push({ role: 'user', parts: [{ text }] });
    if (history.length > 24) history.splice(0, 2);
    typing.classList.add('active');
    body.scrollTop = body.scrollHeight;

    try {
      const res = await fetch(URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: history,
          generationConfig: { maxOutputTokens: 400, temperature: 0.7 }
        })
      });

      const data = await res.json();
      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Maaf, saya belum bisa menjawab sekarang.';
      typing.classList.remove('active');
      addMsg(reply, 'assistant');
      history.push({ role: 'model', parts: [{ text: reply }] });

    } catch (err) {
      typing.classList.remove('active');
      addMsg('Maaf, terjadi gangguan koneksi. Coba lagi ya!', 'assistant');
      console.error(err);
    }

    input.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
